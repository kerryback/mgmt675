      args: [[String(y)], { mode: 'immediate', frame: { duration: 300, redraw: true }, transition: { duration: 300 } }]
    })),
    x: 0.05, y: -0.05,
    len: 0.95,
    currentvalue: { prefix: 'Year: ', font: { size: 14 }, xanchor: 'center' },
    pad: { t: 10 }
  }]
};

const frames = years.map(year => {
  const fd = frameData(year);
  return {
    name: String(year),
    data: [{ x: fd.x, y: fd.y, text: fd.text, marker: fd.marker }],
    layout: {
      annotations: [{
        x: maxVal * 0.97, y: 0.05,
        xref: 'x', yref: 'paper',
        text: String(year),
        showarrow: false,
        font: { size: 52, color: '#dee2e6', family: 'sans-serif' },
        xanchor: 'right'
      }]
    }
  };
});

Plotly.newPlot('chart', [trace], layout, { responsive: true })
  .then(() => Plotly.addFrames('chart', frames));
</script>
</body>
