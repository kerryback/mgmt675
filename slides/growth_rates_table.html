<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
  body { margin: 40px; background: white; font-family: "Aptos Narrow", Calibri, Arial, sans-serif; }
  table { border-collapse: collapse; font-size: 18px; }
  th, td { padding: 8px 18px; border: 1px solid #bbb; }
  th { background: #00131f; color: white; font-weight: bold; text-align: center; }
  th.row-label { text-align: left; min-width: 220px; }
  td { text-align: right; min-width: 80px; }
  td.label { text-align: left; font-weight: bold; background: inherit; }
  tr.input td { background: #dce6f1; }
  tr.calc  td { background: #ffffff; }
</style>
</head><body>
<table>
<thead>
  <tr>
    <th class="row-label">Year</th>
    <th>0</th>
    <th>1</th>
    <th>2</th>
    <th>3</th>
    <th>4</th>
    <th>5</th>
  </tr>
</thead>
<tbody>
  <tr class="input">
    <td class="label">Sales growth rate</td>
    <td></td>
    <td>5%</td>
    <td>10%</td>
    <td>8%</td>
    <td>3%</td>
    <td>3%</td>
  </tr>
  <tr class="calc">
    <td class="label">Sales</td>
    <td>100.0</td>
    <td>105.0</td>
    <td>115.5</td>
    <td>124.7</td>
    <td>128.5</td>
    <td>132.3</td>
  </tr>
  <tr class="input">
    <td class="label">X ratio to Sales</td>
    <td>2.0</td>
    <td>2.0</td>
    <td>2.0</td>
    <td>2.0</td>
    <td>2.0</td>
    <td>2.0</td>
  </tr>
  <tr class="calc">
    <td class="label">X</td>
    <td>200.0</td>
    <td>210.0</td>
    <td>231.0</td>
    <td>249.5</td>
    <td>257.0</td>
    <td>264.7</td>
  </tr>
  <tr class="calc">
    <td class="label">ΔX</td>
    <td></td>
    <td>10.0</td>
    <td>21.0</td>
    <td>18.5</td>
    <td>7.5</td>
    <td>7.7</td>
  </tr>
  <tr class="calc">
    <td class="label">ΔX / Sales</td>
    <td></td>
    <td>10%</td>
    <td>18%</td>
    <td>15%</td>
    <td>6%</td>
    <td>6%</td>
  </tr>
</tbody></table></body></html>
